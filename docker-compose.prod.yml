# Stack de production MiGallery.
# La CD build et pousse l image sur GHCR, puis fait `docker compose pull && up -d`
# sur le serveur. Le .env (secrets) est genere par la CD depuis les secrets GitHub.
#
# data/ est monte depuis le dossier de deploiement pour conserver la base SQLite
# existante (et les caches) entre les versions.
services:
 migallery:
  image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/migallery}:${TAG:-latest}
  restart: always
  build:
   context: .
   dockerfile: Dockerfile
  ports:
   - '${MIGALLERY_HOST_PORT:-3000}:3000'
  environment:
   PORT: '3000'
   NODE_ENV: production
   ORIGIN: ${ORIGIN:-https://gallery.mitv.fr}
   DATABASE_PATH: /app/data/migallery.db
   # Immich (publie sur l hote mitv). Depuis le conteneur, l hote est joignable
   # via son IP LAN.
   IMMICH_BASE_URL: ${IMMICH_BASE_URL:-http://10.0.0.4:2283}
   IMMICH_API_KEY: ${IMMICH_API_KEY:?IMMICH_API_KEY requis}
   MICONNECT_ISSUER: ${MICONNECT_ISSUER:-https://auth.canari-emse.fr/application/o/migallery}
   MICONNECT_CLIENT_ID: ${MICONNECT_CLIENT_ID:?MICONNECT_CLIENT_ID requis}
   MICONNECT_CLIENT_SECRET: ${MICONNECT_CLIENT_SECRET:?MICONNECT_CLIENT_SECRET requis}
   AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET requis}
   AUTH_TRUSTED_HOST: 'true'
   COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET requis}
   # Bun.serve reserves a per-request body buffer sized against this limit. A
   # huge value (was 20G) makes each upload allocate ~512MB under mimalloc that
   # is not returned to the OS, so upload bursts ratchet RSS to OOM. Nothing
   # legitimately needs a big body: simple uploads are < 10MB and large files
   # are sent in 5MB chunks. Keep a small, safe cap.
   BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-64M}
   ENABLE_DEV_ROUTES: 'false'
   # Limite la fragmentation d'arènes glibc pour les allocations natives de
   # libvips (Sharp) : la mémoire native libérée est bien mieux rendue à l'OS,
   # ce qui évite que la RSS stagne à plusieurs Go après des rafales de vignettes.
   MALLOC_ARENA_MAX: '2'
  volumes:
   - ./data:/app/data
