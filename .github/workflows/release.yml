name: Release

# Sur push d un tag v*.*.* : tests multi-Node puis creation de la release GitHub.
on:
 push:
  tags:
   - 'v*.*.*'
   - 'v*.*.*-*'

jobs:
 release-validate:
  name: Release Tests (Node ${{ matrix.node-version }})
  runs-on: ubuntu-latest
  strategy:
   matrix:
    node-version: [20, 22]
  steps:
   - name: Checkout
     uses: actions/checkout@v7

   - name: Setup Node.js ${{ matrix.node-version }}
     uses: actions/setup-node@v7
     with:
      node-version: ${{ matrix.node-version }}
      cache: npm

   - name: Install dependencies
     run: npm ci

   - name: Type check
     run: npm run check

   - name: Lint
     run: npm run lint

   - name: Build
     run: npm run build

   - name: Setup test database
     run: |
      mkdir -p data
      npm run db:init || true

   - name: Create .env for tests
     run: |
      cat > .env << 'EOF'
      ENABLE_DEV_ROUTES=true
      COOKIE_SECRET=ci-test-secret-not-for-production-use
      DATABASE_PATH=./data/migallery.db
      IMMICH_BASE_URL=
      IMMICH_API_KEY=
      AUTH_TRUSTED_HOST=true
      EOF

   - name: Run tests
     env:
      API_BASE_URL: http://localhost:3000
     run: npm run test

 release:
  name: Create GitHub Release
  needs: release-validate
  runs-on: ubuntu-latest
  permissions:
   contents: write
  steps:
   - name: Checkout
     uses: actions/checkout@v7
     with:
      fetch-depth: 0

   - name: Setup Node
     uses: actions/setup-node@v7
     with:
      node-version: 22
      cache: npm

   - name: Install dependencies
     run: npm ci

   - name: Sync version with tag
     run: |
      VERSION=${GITHUB_REF_NAME#v}
      npm version $VERSION --no-git-tag-version --allow-same-version

   - name: Build
     run: npm run build

   - name: Package application
     run: npm run package

   - name: Generate changelog
     id: changelog
     run: |
      PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "$(git describe --tags)" | head -n 1)
      CURRENT_TAG=$(git describe --tags)

      if [ -z "$PREVIOUS_TAG" ]; then
        CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
      else
        CHANGELOG=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges)
      fi

      cat > release_notes.md << EOF
      ## 🚀 What's Changed

      ${CHANGELOG}

      ## 📦 Installation

      \`\`\`bash
      tar -xzf migallery-package.tgz
      cd package
      npm ci --omit=dev
      cp .env.example .env
      # Éditer .env avec vos paramètres
      npm run db:init
      node build/index.js
      \`\`\`

      **Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}
      EOF

   - name: Create GitHub Release
     uses: softprops/action-gh-release@v2
     with:
      body_path: release_notes.md
      files: |
       build/artifacts/*.tgz
