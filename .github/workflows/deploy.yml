name: Deploy to Production

on:
 workflow_run:
  workflows: ['CI']
  types: [completed]
  branches: [main]

jobs:
 deploy:
  name: Deploy to Production
  runs-on: self-hosted
  if: |
   github.event.workflow_run.conclusion == 'success' &&
   github.event.workflow_run.event == 'push' &&
   github.repository == 'emse-students/MiGallery'
  steps:
   - name: Checkout
     uses: actions/checkout@v6

   - name: Install Bun
     uses: oven-sh/setup-bun@v2
     with:
      bun-version: latest

   - name: Install dependencies
     run: bun install

   - name: Build project
     run: bun run build

   - name: Sync SvelteKit
     run: bunx svelte-kit sync

   - name: Update server files
     run: |
      cd ~/MiGallery
      echo "📦 Mise à jour des fichiers du serveur..."
      find . -mindepth 1 -maxdepth 1 \
        -not -name '.env' \
        -not -name 'data' \
        -not -name '.svelte-kit' \
        -not -name 'node_modules' \
        -not -name '.git' \
        -exec rm -rf {} +

      cp -r $GITHUB_WORKSPACE/* .
      cp -r $GITHUB_WORKSPACE/.github .

   - name: Cleanup temporary files
     run: |
      cd ~/MiGallery
      echo "🧹 Nettoyage des fichiers temporaires..."

      if [ -d "data/chunk-uploads" ]; then
        find data/chunk-uploads -type f -mtime +1 -delete
      fi

      find data -name "migallery.db.before-*" -type f -mtime +7 -delete

   - name: Initialize database if needed
     run: |
      cd ~/MiGallery
      if [ ! -f "data/migallery.db" ]; then
        echo "📝 Database not found, initializing..."
        bun run db:init
      else
        echo "✓ Using existing database"
      fi

      echo "🔄 Running migrations..."
      bun run db:migrate

   - name: Restart application
     run: |
      cd ~/MiGallery
      echo "🔌 Restarting application..."
      pm2 delete migallery || true
      pm2 start /home/mitv/.bun/bin/bun \
        --name migallery \
        --cwd /home/mitv/MiGallery \
        -- run /home/mitv/MiGallery/build/index.js
      pm2 save

   - name: Wait for server
     run: |
      cd ~/MiGallery
      echo "⏳ Waiting for server to start..."
      node scripts/wait-for-server.mjs http://localhost:3000 30000

   - name: Health check
     run: |
      echo "🏥 Running health check..."
      curl -sf http://localhost:3000/api/health && echo "✅ Deployment successful" || echo "⚠️ Health check failed"
