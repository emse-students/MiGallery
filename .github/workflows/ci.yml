name: CI

# Validation (lint / type-check / build / tests) on PRs and, via workflow_call,
# as the CD gate (cd.yml calls it before building/deploying the image).
# No `push` trigger: on main, the CD runs this CI exactly once.
#
# Node runtime (npm). Bun was dropped: it inflated request-body reads ~80x and
# retained memory (unfixed upstream bug), which OOM-killed prod.
on:
 pull_request:
  branches: [main]
 workflow_call:

jobs:
 validate:
  name: Validate
  runs-on: ubuntu-latest
  steps:
   - name: Checkout
     uses: actions/checkout@v7

   - name: Setup Node
     uses: actions/setup-node@v7
     with:
      node-version: 24
      cache: npm

   - name: Install dependencies
     run: npm ci

   - name: Type check
     run: npm run check

   - name: Lint
     env:
      NODE_OPTIONS: '--max-old-space-size=16384'
     run: npm run lint

   - name: Build
     run: npm run build

   - name: Setup test database
     run: |
      mkdir -p data
      npm run db:init || true

   - name: Create .env for tests
     run: |
      cat > .env << 'EOF'
      ENABLE_DEV_ROUTES=true
      COOKIE_SECRET=ci-test-secret-not-for-production-use
      DATABASE_PATH=./data/migallery.db
      IMMICH_BASE_URL=
      IMMICH_API_KEY=
      AUTH_TRUSTED_HOST=true
      EOF

   - name: Run tests
     env:
      API_BASE_URL: http://localhost:3000
     run: npm run test
