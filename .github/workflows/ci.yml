name: CI

# Validation (lint / type-check / build / tests) sur les PR et, via workflow_call,
# comme barriere de la CD (cd.yml l appelle avant de construire/deployer l image).
# Pas de declencheur `push` : sur main, la CD execute cette CI une seule fois.
#
# Runtime Node (npm). Bun est abandonne : il inflate ~80x la lecture des corps de
# requete et retient la memoire (bug amont non corrige), ce qui faisait OOM la prod.
on:
 pull_request:
  branches: [main]
 workflow_call:

jobs:
 validate:
  name: Validate
  runs-on: ubuntu-latest
  steps:
   - name: Checkout
     uses: actions/checkout@v7

   - name: Setup Node
     uses: actions/setup-node@v7
     with:
      node-version: 22
      cache: npm

   - name: Install dependencies
     run: npm ci

   - name: Type check
     run: npm run check

   - name: Lint
     env:
      NODE_OPTIONS: '--max-old-space-size=16384'
     run: npm run lint

   - name: Build
     run: npm run build

   - name: Setup test database
     run: |
      mkdir -p data
      npm run db:init || true

   - name: Create .env for tests
     run: |
      cat > .env << 'EOF'
      ENABLE_DEV_ROUTES=true
      COOKIE_SECRET=ci-test-secret-not-for-production-use
      DATABASE_PATH=./data/migallery.db
      IMMICH_BASE_URL=
      IMMICH_API_KEY=
      AUTH_TRUSTED_HOST=true
      EOF

   - name: Run tests
     env:
      API_BASE_URL: http://localhost:3000
     run: npm run test
