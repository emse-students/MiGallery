name: CI

# Validation (lint / type-check / build / tests) sur les PR et, via workflow_call,
# comme barriere de la CD (cd.yml l appelle avant de construire/deployer l image).
# Pas de declencheur `push` : sur main, la CD execute cette CI une seule fois.
#
# CI Bun uniquement : MiGallery est un projet Bun (Dockerfile et bun.lock font foi).
# Le runtime npm n est pas teste car svelte-adapter-bun declare `peer typescript@^5`,
# ce que le resolveur strict de npm refuse avec TypeScript 6 (Bun, lui, l accepte).
on:
 pull_request:
  branches: [main]
 workflow_call:

jobs:
 validate:
  name: Validate
  runs-on: ubuntu-latest
  steps:
   - name: Checkout
     uses: actions/checkout@v6

   - name: Setup Bun
     uses: oven-sh/setup-bun@v2
     with:
      bun-version: latest

   - name: Install dependencies
     run: bun install --frozen-lockfile

   - name: Type check
     run: bun run check

   - name: Lint
     env:
      NODE_OPTIONS: '--max-old-space-size=16384'
     run: bun run lint

   - name: Build
     run: bun run build

   - name: Setup test database
     run: |
      mkdir -p data
      bun run db:init || true

   - name: Create .env for tests
     run: |
      cat > .env << 'EOF'
      ENABLE_DEV_ROUTES=true
      COOKIE_SECRET=ci-test-secret-not-for-production-use
      DATABASE_PATH=./data/migallery.db
      IMMICH_BASE_URL=
      IMMICH_API_KEY=
      AUTH_TRUSTED_HOST=true
      EOF

   - name: Run tests
     env:
      API_BASE_URL: http://localhost:3000
     run: bun run test
